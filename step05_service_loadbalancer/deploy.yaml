# deploy.yaml
apiVersion: apps/v1 # pod 는 v1 이지만  deploy 에서는  apps/v1 이다 
kind: Deployment # 리소스의 종류는 Deployment
metadata:
  # Deployment 의 사령관(컨트롤러)의 이름이 nginx-deploy 이다 (이름은 마음대로 지을수 있다)
  # 해당 namespace (default) 에서 유일해야 한다  
  name: nginx-deploy
# pod 를 어떤 상태로 관리할 것인지 명시한다 
spec:
  replicas: 3 # 배포되는 pod 의 갯수 설정 (default 값은 1)
  # 도대체 어떤 pod 를 관리할것인지 선택하는 역활 
  selector:
    # pod 중에 아래의 label 과 정확히 일치하는 pod 들을 관리 하겠다
    matchLabels:
      # app: web-app  ->  app 이라는 key값으로 web-app 이라는 value 를 가지고 있는 pod 를 의미한다 
      # key 와 value 는 마음대로 지을수 있다 -> 결국 관리의 편의를 위해 법칙을 정해야한다 
      app: web-app
  # pod 의 설계도 역활 (pod 가 새로 생기거나 죽었다가 다시 살아 날때 여기 있는 설계도 대로 만들어진다)
  template:
    metadata:
      labels:
        # 위에서 정의한 selector 와 정확히 일치 해야 한다
        app: web-app
    # pod 안에 어떤 container 를 띄울지 정의한다 
    spec:
      containers:
      - name: nginx-ctn # 컨테이너의 이름 
        image: nginx:latest # 이미지 