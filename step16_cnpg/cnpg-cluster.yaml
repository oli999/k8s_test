# step16_cnpg/cnpg-cluster.yaml 파일
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: my-pg-cluster
spec:
  instances: 3 # 숫자 3만 적으면 Primary 1대 + Replica2 대를 알아서 구성함

  # 스토리지 설정
  storage:
    size: 1Gi
    # pv.yaml 파일에 작성한 pv 의 class name 을 그대로 적어둔다 
    storageClass: pv-postgres
  bootstrap:
    # db 를 초기화 하는 용도로 사용한다, 계정, 비밀번호, 초기화 sql 실행 등 
    initdb:
      # scott_db 라는 이름의 db 를 만들어서 
      database: scott_db
      # 소유권을 scott 으로 하겠다.
      owner: scott
      # 계정, 비밀번호 는 secret 에서 읽어와서 넣어주기 
      secret:
        # pg-db-secret 라는 이름의 secret 를 만들어야 한다.
        name: pg-db-secret
      postInitApplicationSQLRefs:
        # configmap 에 있는 내용(sql)을 postgres 가 준비되면 최조한번 실행 하겠다는 의미
        configMapRefs:
          - name: pg-db-init-sql
            key: init.sql
  # postgres 버전 지정 
  imageName: ghcr.io/cloudnative-pg/postgresql:15