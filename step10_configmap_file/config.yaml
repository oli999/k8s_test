# step10_configmap_file/config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  # 특정 키값으로 여러줄의 문자열을 저장해 놓고 마치 file 처럼 활용할수 있다
  # key 의 이름은 마음대로 지을수 있다.
  nginx-conf-file: |
    user nginx;
    worker_processes auto;
    events { worker_connections 1024; }
    http {
        server {
            listen 80;
            location / {
                root /usr/share/nginx/html;
                index index.html;
            }
        }
    }    